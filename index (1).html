<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0F1923">
<title>家庭財務 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ── 重置 ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{font-family:-apple-system,'SF Pro Display','Noto Sans TC',sans-serif;
     background:#0F1923;color:#E8EDF2;height:100%;overflow:hidden;
     -webkit-font-smoothing:antialiased}

/* ── 設計語言：深海導航台 ── */
:root{
  --bg:       #0F1923;
  --surface:  #162230;
  --card:     #1C2D3E;
  --border:   #243548;
  --accent:   #3DD9B3;   /* 翠綠：正增長 */
  --warn:     #F5A623;   /* 琥珀：注意 */
  --danger:   #E85555;   /* 紅：超支 */
  --blue:     #4A9EFF;   /* 藍：投資 */
  --purple:   #A78BFA;   /* 紫：資產 */
  --txt:      #E8EDF2;
  --txt2:     #8BA0B8;
  --txt3:     #4A6580;
  --radius:   16px;
  --radius-s: 10px;
  --safe-b:   env(safe-area-inset-bottom,0px);
}

/* ── 主容器 ── */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:480px;margin:0 auto;position:relative}

/* ── 內容區 ── */
.pages{flex:1;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth;
       padding-bottom:calc(72px + var(--safe-b));scrollbar-width:none}
.pages::-webkit-scrollbar{display:none}
.page{display:none;padding:16px 16px 0;animation:fadeIn .2s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── 底部導覽 ── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
     width:100%;max-width:480px;
     background:rgba(15,25,35,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
     border-top:1px solid var(--border);
     padding:8px 0 calc(8px + var(--safe-b));
     display:flex;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
          padding:6px 0;cursor:pointer;border:none;background:none;color:var(--txt3);
          font-size:10px;font-weight:600;letter-spacing:.02em;transition:color .15s}
.nav-btn.active{color:var(--accent)}
.nav-btn .icon{font-size:22px;line-height:1}

/* ── 通用 ── */
.section-title{font-size:11px;font-weight:700;color:var(--txt3);
               text-transform:uppercase;letter-spacing:.08em;margin:20px 0 10px}
.card{background:var(--card);border-radius:var(--radius);padding:16px;
      margin-bottom:12px;border:1px solid var(--border)}
.card-title{font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:12px;letter-spacing:.03em}
.amount-large{font-size:28px;font-weight:700;letter-spacing:-.02em;line-height:1}
.amount-med{font-size:18px;font-weight:700}
.amount-sm{font-size:14px;font-weight:600}
.green{color:var(--accent)}.red{color:var(--danger)}.gold{color:var(--warn)}.blue{color:var(--blue)}.purple{color:var(--purple)}
.divider{height:1px;background:var(--border);margin:10px 0}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.badge-green{background:rgba(61,217,179,.15);color:var(--accent)}
.badge-red{background:rgba(232,85,85,.15);color:var(--danger)}
.badge-gold{background:rgba(245,166,35,.15);color:var(--warn)}
.row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
.row-left{flex:1;min-width:0}
.row-name{font-size:13px;font-weight:600;color:var(--txt)}
.row-sub{font-size:11px;color:var(--txt3);margin-top:2px}
.row-amt{font-size:14px;font-weight:700;text-align:right;flex-shrink:0;margin-left:10px}

/* ── 1. 總覽 ── */
.hero{background:linear-gradient(135deg,#162230,#1a2f44);
      border-radius:var(--radius);padding:20px;margin-bottom:12px;
      border:1px solid var(--border);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;
              width:160px;height:160px;background:radial-gradient(circle,rgba(61,217,179,.08),transparent 70%)}
.hero-label{font-size:11px;color:var(--txt3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.hero-value{font-size:36px;font-weight:800;letter-spacing:-.03em;color:var(--txt);line-height:1.1}
.hero-sub{font-size:13px;color:var(--txt2);margin-top:6px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--card);border-radius:var(--radius-s);padding:14px;border:1px solid var(--border)}
.stat-label{font-size:10px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.stat-value{font-size:20px;font-weight:700;line-height:1}
.month-selector{display:flex;overflow-x:auto;gap:6px;padding:2px 0 10px;scrollbar-width:none}
.month-selector::-webkit-scrollbar{display:none}
.month-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;
           border:1.5px solid var(--border);background:none;color:var(--txt3);cursor:pointer;transition:all .15s}
.month-btn.active{background:var(--accent);color:#0F1923;border-color:var(--accent)}
.month-btn.has-data{border-color:rgba(61,217,179,.4);color:var(--accent)}

/* ── 2. 支出 ── */
.chart-wrap{height:220px;position:relative;margin:4px 0 16px}
.cat-item{cursor:pointer;border-radius:var(--radius-s);overflow:hidden;margin-bottom:6px;border:1px solid var(--border)}
.cat-head{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--card);transition:background .1s}
.cat-head:active{background:var(--surface)}
.cat-icon-wrap{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.cat-body{flex:1;min-width:0}
.cat-name{font-size:13px;font-weight:700;color:var(--txt)}
.cat-meta{display:flex;align-items:center;gap:6px;margin-top:3px}
.cat-amt{font-size:15px;font-weight:800}
.cat-budget{font-size:10px;color:var(--txt3)}
.progress{height:3px;background:var(--border);border-radius:2px;margin-top:5px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.cat-pct{font-size:11px;color:var(--txt3);flex-shrink:0;margin-left:auto}
.chevron{font-size:14px;color:var(--txt3);flex-shrink:0;transition:transform .2s}
.cat-item.open .chevron{transform:rotate(90deg)}
.detail-wrap{max-height:0;overflow:hidden;transition:max-height .3s ease}
.detail-wrap.open{max-height:1200px}
.detail-hdr{display:flex;justify-content:space-between;padding:8px 14px;font-size:11px;color:var(--txt3);background:var(--surface);border-top:1px solid var(--border)}
.detail-row{display:flex;align-items:center;gap:8px;padding:9px 14px;border-top:1px solid var(--border);background:var(--surface)}
.d-date{font-size:11px;color:var(--txt3);width:36px;flex-shrink:0;font-weight:600}
.d-desc{flex:1;font-size:12px;color:var(--txt);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d-card{font-size:10px;color:var(--txt3);flex-shrink:0;max-width:50px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d-amt{font-size:13px;font-weight:700;flex-shrink:0;text-align:right;min-width:52px}
.d-amt.big{color:var(--danger)}

/* ── 3. 收入 ── */
.inc-section{margin-bottom:16px}
.inc-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.inc-section-label{font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em}
.inc-total-badge{font-size:12px;font-weight:700;color:var(--accent)}

/* ── 4. 投資 ── */
.inv-group{margin-bottom:16px}
.inv-group-title{font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.inv-rate-note{font-size:10px;color:var(--txt3);font-weight:400}

/* ── 5. 資產 ── */
.asset-chart-wrap{height:180px;margin:8px 0 16px}
.asset-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.asset-item:last-child{border-bottom:none}
.asset-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.asset-name{flex:1;font-size:13px;font-weight:600;color:var(--txt)}
.asset-owner{font-size:10px;color:var(--txt3);margin-top:2px}
.asset-amt{font-size:14px;font-weight:700;text-align:right}
.asset-input{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;
             color:var(--txt);font-size:14px;font-weight:600;text-align:center;
             padding:6px 10px;width:120px;outline:none;transition:border-color .15s}
.asset-input:focus{border-color:var(--accent)}
.asset-input::placeholder{color:var(--txt3)}
.save-btn{background:var(--accent);color:#0F1923;border:none;border-radius:var(--radius-s);
          padding:12px;font-size:14px;font-weight:700;width:100%;cursor:pointer;
          margin-top:12px;letter-spacing:.02em}

/* ── 6. 保險 ── */
.ins-month-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:16px}
.ins-month-cell{background:var(--card);border-radius:var(--radius-s);padding:8px 4px;text-align:center;border:1px solid var(--border);cursor:pointer;transition:all .15s}
.ins-month-cell.active{border-color:var(--accent);background:rgba(61,217,179,.08)}
.ins-month-cell .m-num{font-size:12px;font-weight:700;color:var(--txt)}
.ins-month-cell .m-amt{font-size:9px;color:var(--txt3);margin-top:2px}
.ins-month-cell.high .m-amt{color:var(--warn)}
.ins-month-cell.very-high .m-amt{color:var(--danger)}
.ins-person-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.ins-person-row:last-child{border-bottom:none}
.ins-person-name{font-size:12px;font-weight:700;color:var(--txt);width:80px;flex-shrink:0}
.ins-item-name{flex:1;font-size:11px;color:var(--txt2)}
.ins-amt{font-size:13px;font-weight:700;text-align:right}

/* ── Toast ── */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);
       background:var(--accent);color:#0F1923;padding:10px 20px;border-radius:20px;
       font-size:13px;font-weight:700;z-index:999;transition:transform .3s cubic-bezier(.4,0,.2,1);pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

.empty{text-align:center;padding:40px 20px;color:var(--txt3);font-size:13px}
</style>
</head>
<body>
<div class="app">
  <div class="pages" id="pages">

    <!-- ══ 頁1：總覽 ══ -->
    <div class="page active" id="pg-overview">
      <div class="month-selector" id="overviewMonths"></div>
      <div class="hero">
        <div class="hero-label">本月總支出</div>
        <div class="hero-value" id="ov-total">—</div>
        <div class="hero-sub" id="ov-sub">選擇月份查看</div>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">月預算上限</div>
          <div class="stat-value gold" id="ov-budget">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">超支 / 剩餘</div>
          <div class="stat-value" id="ov-diff">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">最大支出</div>
          <div class="stat-value" id="ov-top">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">消費筆數</div>
          <div class="stat-value blue" id="ov-count">—</div>
        </div>
      </div>
      <div class="section-title">各類別概覽</div>
      <div id="ovCats"></div>
      <div style="height:8px"></div>
    </div>

    <!-- ══ 頁2：支出 ══ -->
    <div class="page" id="pg-expense">
      <div class="month-selector" id="expMonths"></div>
      <div class="card">
        <div class="card-title">支出比例</div>
        <div class="chart-wrap"><canvas id="pieChart"></canvas></div>
      </div>
      <div id="catList"></div>
      <div style="height:8px"></div>
    </div>

    <!-- ══ 頁3：收入 ══ -->
    <div class="page" id="pg-income">
      <div class="month-selector" id="incMonths"></div>
      <div class="card" style="margin-bottom:12px">
        <div class="card-title">本月收入合計</div>
        <div class="amount-large green" id="inc-total">—</div>
        <div style="font-size:12px;color:var(--txt3);margin-top:6px" id="inc-sub">點下方類別填入金額</div>
      </div>
      <div id="incList"></div>
      <div style="height:8px"></div>
    </div>

    <!-- ══ 頁4：投資 ══ -->
    <div class="page" id="pg-invest">
      <div class="month-selector" id="invMonths"></div>
      <div class="card" style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div class="card-title" style="margin:0">本月投入合計</div>
          <div style="font-size:11px;color:var(--txt3)">美股匯率 32</div>
        </div>
        <div class="amount-large blue" id="inv-total">—</div>
      </div>
      <div id="invList"></div>
      <div style="height:8px"></div>
    </div>

    <!-- ══ 頁5：資產 ══ -->
    <div class="page" id="pg-asset">
      <div class="card">
        <div class="card-title">家庭總資產</div>
        <div class="amount-large purple" id="asset-total">請填入帳戶餘額</div>
        <div style="font-size:12px;color:var(--txt3);margin-top:4px">9個帳戶加總</div>
      </div>
      <div class="section-title">各帳戶餘額 — 每月2號更新</div>
      <div class="card" id="assetInputs"></div>
      <div style="height:8px"></div>
    </div>

    <!-- ══ 頁6：保險 ══ -->
    <div class="page" id="pg-insurance">
      <div class="section-title">選擇月份</div>
      <div class="ins-month-grid" id="insMonthGrid"></div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div class="card-title" style="margin:0">本月保費合計</div>
          <div class="amount-med gold" id="ins-total">—</div>
        </div>
        <div id="insDetail"></div>
      </div>
      <div style="height:8px"></div>
    </div>

  </div><!-- /pages -->

  <!-- 底部導覽 -->
  <nav class="nav">
    <button class="nav-btn active" onclick="switchPage('overview',this)">
      <span class="icon">📊</span>總覽
    </button>
    <button class="nav-btn" onclick="switchPage('expense',this)">
      <span class="icon">💸</span>支出
    </button>
    <button class="nav-btn" onclick="switchPage('income',this)">
      <span class="icon">💰</span>收入
    </button>
    <button class="nav-btn" onclick="switchPage('invest',this)">
      <span class="icon">💹</span>投資
    </button>
    <button class="nav-btn" onclick="switchPage('asset',this)">
      <span class="icon">🏦</span>資產
    </button>
    <button class="nav-btn" onclick="switchPage('insurance',this)">
      <span class="icon">🛡️</span>保險
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script>

  document.getElementById('ov-top').textContent=topCat?topCat[0].slice(0,4):'—';

  document.getElementById('ov-sub').textContent=total?`月預算使用 ${(total/TOTAL_BUDGET*100).toFixed(0)}%`:'本月尚無記錄';

          <span style="font-size:13px;font-weight:700">${cat.slice(2).trim()}</span>
          <span style="font-size:14px;font-weight:700;color:${pct>=1?'var(--danger)':color}">${fmt(cd.total)}</span>
        </div>

function renderExpense(m){
  const mData=MONTHLY[String(m)]||{};
  const cats=Object.entries(mData).sort((a,b)=>b[1].total-a[1].total);
  const total=cats.reduce((s,[,v])=>s+v.total,0);

  // 圓餅圖
  if(pieChart)pieChart.destroy();
  const ctx=document.getElementById('pieChart').getContext('2d');
  if(total){
    pieChart=new Chart(ctx,{
      type:'pie',
      data:{labels:cats.map(([c])=>c.slice(0,2)+c.slice(2).trim()),
            datasets:[{data:cats.map(([,v])=>v.total),
              backgroundColor:cats.map(([c])=>CAT_COLORS[c]||'#94A3B8'),
              borderColor:'#162230',borderWidth:2,hoverOffset:10}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},
          tooltip:{callbacks:{label(ctx){return ` ${fmt(ctx.raw)} (${(ctx.raw/total*100).toFixed(1)}%)`;}}}},
        onClick(e,items){if(!items.length)return;toggleCat(cats[items[0].index][0],true);}}
    });
  }

  // 類別列表
  openCat=null;
  const listEl=document.getElementById('catList');listEl.innerHTML='';
  if(!total){listEl.innerHTML='<div class="empty">本月尚無支出記錄</div>';return;}
  cats.forEach(([cat,cd])=>{
    const budget=BUDGETS[cat]||0, pct=budget?cd.total/budget:0;
    const color=CAT_COLORS[cat]||'#94A3B8';
    const barColor=pct>=1?'var(--danger)':pct>=.8?'var(--warn)':'var(--accent)';
    const key=encodeURIComponent(cat);
    const wrap=document.createElement('div');
    wrap.className='cat-item';wrap.id='cat-'+key;
    wrap.innerHTML=`
      <div class="cat-head" onclick="toggleCat('${cat.replace(/'/g,"\'")}',false)">
        <div class="cat-icon-wrap" style="background:${color}22">${cat.slice(0,2)}</div>
        <div class="cat-body">
          <div class="cat-name">${cat.slice(2).trim()}</div>
          <div class="cat-meta">
            <span class="cat-amt" style="color:${pct>=1?'var(--danger)':color}">${fmt(cd.total)}</span>
            ${budget?`<span class="cat-budget">預算${fmt(budget)}</span>`:''}
            <span class="cat-pct">${(cd.total/total*100).toFixed(1)}%</span>
          </div>
          ${budget?`<div class="progress"><div class="progress-fill" style="width:${Math.min(100,pct*100).toFixed(1)}%;background:${barColor}"></div></div>`:''}
        </div>
        <span class="chevron">›</span>
      </div>
      <div class="detail-wrap" id="panel-${key}">
        <div class="detail-hdr"><span>${(cd.items||[]).length} 筆</span><strong>${fmt(cd.total)}</strong></div>
        ${(cd.items||[]).map(it=>`
          <div class="detail-row">
            <span class="d-date">${it.date}</span>
            <span class="d-desc">${it.desc||'（無說明）'}</span>
            <span class="d-card">${shortCard(it.card)}</span>
            <span class="d-amt${it.amt>=5000?' big':''}">${fmt(it.amt)}</span>
          </div>`).join('')}
      </div>`;
    listEl.appendChild(wrap);
  });
}
function toggleCat(cat,scroll){
  const key=encodeURIComponent(cat);
  const item=document.getElementById('cat-'+key);
  const panel=document.getElementById('panel-'+key);
  if(openCat===cat){openCat=null;item?.classList.remove('open');panel?.classList.remove('open');}
  else{
    if(openCat){const ok=encodeURIComponent(openCat);document.getElementById('cat-'+ok)?.classList.remove('open');document.getElementById('panel-'+ok)?.classList.remove('open');}
    openCat=cat;item?.classList.add('open');panel?.classList.add('open');
    if(scroll&&item)setTimeout(()=>item.scrollIntoView({behavior:'smooth',block:'center'}),200);
  }
}

  const grid=document.getElementById('insMonthGrid');grid.innerHTML='';
  MONTHS_ZH.forEach((m,i)=>{
    const total=INS_TOT[i];
    const cell=document.createElement('div');
    cell.className='ins-month-cell'+(i===4?' active':'')+(total>20000?' very-high':total>10000?' high':'');
    cell.innerHTML=`<div class="m-num">${m}</div><div class="m-amt">${total?(total/1000).toFixed(0)+'K':'—'}</div>`;
    cell.onclick=()=>{grid.querySelectorAll('.ins-month-cell').forEach(c=>c.classList.remove('active'));cell.classList.add('active');renderInsurance(i+1);};
    grid.appendChild(cell);
  });
  renderInsurance(5);
}
function renderInsurance(m){
  const total=INS_TOT[m-1];
  document.getElementById('ins-total').textContent=total?fmt(total):'—';
  const el=document.getElementById('insDetail');el.innerHTML='';
  const monthIns=INS_LIST.filter(ins=>ins.monthly[m-1]>0);
  if(!monthIns.length){el.innerHTML='<div class="empty">本月無保費</div>';return;}
  // 按人分組
  const byPerson={};
  monthIns.forEach(ins=>{
    if(!byPerson[ins.person])byPerson[ins.person]=[];
    byPerson[ins.person].push(ins);
  });
  Object.entries(byPerson).forEach(([person,items])=>{
    const pTotal=items.reduce((s,i)=>s+i.monthly[m-1],0);
    const grpDiv=document.createElement('div');
    grpDiv.style.cssText='margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)';
    grpDiv.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:12px;font-weight:700;color:var(--warn)">${person}</span>
      <span style="font-size:12px;font-weight:700;color:var(--warn)">${fmt(pTotal)}</span>
    </div>
    ${items.map(ins=>`<div class="ins-person-row">
      <div style="flex:1;font-size:12px;color:var(--txt)">${ins.name}</div>
      <div class="ins-amt" style="color:var(--txt)">${fmt(ins.monthly[m-1])}</div>
    </div>`).join('')}`;
    el.appendChild(grpDiv);
  });
}

// ── 頁面切換 ──
function switchPage(name, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pg-'+name).classList.add('active');
  btn.classList.add('active');
  document.getElementById('pages').scrollTop=0;
  curPage=name;
  if(name==='overview') renderOverview(curMonth);
  else if(name==='expense') renderExpense(curMonth);
  else if(name==='income') renderIncome(curMonth);
  else if(name==='invest') renderInvest(curMonth);
  else if(name==='asset') initAssets();
  else if(name==='insurance') initInsurance();
}

// ── Toast ──
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── 初始化 ──
function selectMonth(m){
  curMonth=m;
  ['overviewMonths','expMonths','incMonths','invMonths'].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    el.querySelectorAll('.month-btn').forEach((b,i)=>b.classList.toggle('active',i===m-1));
  });
  if(curPage==='overview')renderOverview(m);
  else if(curPage==='expense')renderExpense(m);
  else if(curPage==='income')renderIncome(m);
  else if(curPage==='invest')renderInvest(m);
}

// 建立各頁月份選擇器
['overviewMonths','expMonths','incMonths','invMonths'].forEach(id=>{
  buildMonthSel(id,(m)=>selectMonth(m),curMonth);
});

// 初始渲染
renderOverview(curMonth);
</script>
