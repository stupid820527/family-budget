<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>🏠 家庭支出分析 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#1B4F72;--blue:#2E86C1;--lblue:#D6EAF8;
  --green:#1E8449;--lgreen:#D5F5E3;--dgreen:#0B5345;
  --red:#C0392B;--lred:#FADBD8;
  --gold:#9A7D0A;--lgold:#FEF9E7;
  --grey:#F2F3F4;--dark:#212F3D;
  --radius:14px;--shadow:0 2px 14px rgba(0,0,0,0.09);
}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:#EEF2F7;color:var(--dark);min-height:100vh;padding-bottom:30px}

.header{background:linear-gradient(135deg,#1B4F72,#2E86C1);color:#fff;padding:18px 20px 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.2)}
.header-row{display:flex;align-items:center;justify-content:space-between}
.header-title{font-size:18px;font-weight:800}
.header-sub{font-size:11px;opacity:.75;margin-top:3px}
.year-badge{background:rgba(255,255,255,0.2);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700}
.update-badge{font-size:10px;background:rgba(255,255,255,.18);border-radius:12px;padding:2px 8px;margin-left:6px;opacity:.9}
.refresh-btn{background:rgba(255,255,255,0.18);border:none;color:#fff;font-size:13px;padding:6px 10px;border-radius:20px;cursor:pointer;margin-left:8px}
.refresh-btn:active{background:rgba(255,255,255,0.35)}

.month-bar{display:flex;overflow-x:auto;gap:6px;padding:12px 16px;background:#fff;border-bottom:1px solid #E0E6ED;position:sticky;top:58px;z-index:99;scrollbar-width:none}
.month-bar::-webkit-scrollbar{display:none}
.m-btn{flex-shrink:0;min-width:44px;padding:7px 12px;border-radius:20px;border:1.5px solid #DDE3ED;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#666;transition:all .15s}
.m-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);box-shadow:0 2px 8px rgba(27,79,114,0.3)}
.m-btn.has-data{border-color:#aac4dc;color:var(--navy)}

.content{padding:14px 14px 0;max-width:520px;margin:0 auto}
.card{background:#fff;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:13px}
.card-title{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}

.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.s-item{background:var(--grey);border-radius:10px;padding:12px 8px;text-align:center}
.s-label{font-size:10px;color:#999;margin-bottom:4px}
.s-value{font-size:17px;font-weight:800;color:var(--dark)}
.s-value.red{color:var(--red)}.s-value.green{color:var(--green)}.s-value.gold{color:var(--gold)}

.chart-hint{font-size:11px;color:#999;text-align:center;margin-bottom:10px}
.chart-wrap{position:relative;height:250px}

.cat-list{display:flex;flex-direction:column}
.cat-item{padding:13px 14px;cursor:pointer;border-left:4px solid transparent;display:flex;align-items:center;gap:11px;border-bottom:1px solid #F0F4F8;transition:background .1s}
.cat-item:last-child{border-bottom:none}
.cat-item.open{background:#FAFBFF;border-bottom:none}
.cat-icon{font-size:20px;flex-shrink:0;width:32px;text-align:center}
.cat-info{flex:1;min-width:0}
.cat-name{font-size:13px;font-weight:700;color:var(--dark)}
.cat-row2{display:flex;align-items:center;gap:8px;margin-top:3px}
.cat-amt{font-size:15px;font-weight:800}
.cat-budget-info{font-size:10px;color:#AAA}
.cat-pct-badge{margin-left:auto;background:var(--grey);border-radius:10px;padding:2px 7px;font-size:11px;font-weight:600;color:#666;flex-shrink:0}
.progress-bar{height:4px;background:#EEE;border-radius:2px;overflow:hidden;margin-top:5px}
.progress-fill{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.arrow{font-size:13px;color:#CCC;transition:transform .2s;flex-shrink:0;margin-left:4px}
.cat-item.open .arrow{transform:rotate(90deg)}
.over-badge{background:var(--lred);color:var(--red);font-size:10px;font-weight:700;padding:2px 6px;border-radius:8px;flex-shrink:0}

.detail-panel{background:#F5F8FF;overflow:hidden;max-height:0;transition:max-height .35s ease;border-bottom:1px solid #E8EEF8}
.detail-panel.open{max-height:2000px}
.detail-header{display:flex;justify-content:space-between;padding:9px 14px 7px;font-size:11px;color:#888;border-bottom:1px solid #E8EEF8;background:#EEF3FC}
.detail-header strong{color:var(--navy)}
.detail-row{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid #EEF0F5}
.detail-row:last-child{border-bottom:none}
.d-date{font-size:11px;color:#AAA;flex-shrink:0;width:38px;font-weight:600}
.d-desc{flex:1;font-size:12px;color:var(--dark);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d-card{font-size:10px;color:#BBB;flex-shrink:0;max-width:50px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right}
.d-amt{font-size:13px;font-weight:700;color:var(--dark);flex-shrink:0;text-align:right;min-width:60px}
.d-amt.big{color:var(--red)}

.empty{text-align:center;padding:40px 20px;color:#BBB;font-size:13px}
.empty-icon{font-size:36px;margin-bottom:8px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#222;color:#fff;font-size:12px;font-weight:600;padding:10px 20px;border-radius:20px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* loading skeleton */
.skel{background:linear-gradient(90deg,#eee 25%,#f5f5f5 50%,#eee 75%);background-size:200% 100%;animation:skel 1.2s infinite;border-radius:8px;height:16px;margin-bottom:8px}
@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div>
      <div class="header-title">🏠 家庭支出分析<span class="update-badge" id="updBadge"></span></div>
      <div class="header-sub">點圓餅圖或類別查看每筆明細</div>
    </div>
    <div style="display:flex;align-items:center">
      <div class="year-badge">2026</div>
      <button class="refresh-btn" onclick="loadData(true)" title="重新載入">↺</button>
    </div>
  </div>
</div>

<div class="month-bar" id="monthBar"></div>

<div class="content">
  <div class="card">
    <div class="card-title">本月財務摘要</div>
    <div class="summary-grid">
      <div class="s-item"><div class="s-label">總支出</div><div class="s-value red" id="sumTotal">—</div></div>
      <div class="s-item"><div class="s-label">月預算上限</div><div class="s-value gold" id="sumBudget">—</div></div>
      <div class="s-item"><div class="s-label">超支／剩餘</div><div class="s-value" id="sumDiff">—</div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">支出比例圓餅圖</div>
    <div class="chart-hint">👆 點色塊查看該類別每筆消費</div>
    <div class="chart-wrap"><canvas id="pieChart"></canvas></div>
  </div>

  <div class="card" style="padding:0;overflow:hidden">
    <div style="padding:12px 14px 8px"><div class="card-title" style="margin-bottom:0">各類別明細</div></div>
    <div class="cat-list" id="catList">
      <div style="padding:20px"><div class="skel"></div><div class="skel" style="width:70%"></div><div class="skel" style="width:85%"></div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
//  設定：Google Sheets CSV 網址（已固定，無需手動輸入）
// ═══════════════════════════════════════════════════════
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSWdOhR75-v479u3tmyPbkrnQDco54PbkjRiDNDEnQpC-h5wB1oMd2WmfRBO0QmPw/pub?gid=164480810&single=true&output=csv';

// CORS proxy — Google Sheets 發布 CSV 有 CORS 限制需要代理
// 主要用 allorigins，失敗自動換備用
const PROXIES = [
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://thingproxy.freeboard.io/fetch/${u}`,
];

// ═══════════════════════════════════════════════════════
//  預算設定（對應設定 sheet）
// ═══════════════════════════════════════════════════════
const BUDGETS = {
  '🍽️ 飲食':24000,'🏠 居家開銷':8000,'🚗 汽車':4000,
  '🛍️ 娛樂血拚':8000,'🏥 看醫生':1500,'📚 終身學習':3000,
  '🛡️ 保險':14000,'👶 小孩學習':27600,'📱 網路訂閱':3500,
  '🧸 小孩日用品':5000,'💬 其他':1000
};
const TOTAL_BUDGET = Object.values(BUDGETS).reduce((a,b)=>a+b,0);
const CAT_COLORS = {
  '🍽️ 飲食':'#FF8C42','🏠 居家開銷':'#4ECDC4','🚗 汽車':'#E74C3C',
  '🛍️ 娛樂血拚':'#9B59B6','🏥 看醫生':'#3498DB','📚 終身學習':'#27AE60',
  '🛡️ 保險':'#F39C12','👶 小孩學習':'#E91E8C','📱 網路訂閱':'#1ABC9C',
  '🧸 小孩日用品':'#E84393','💬 其他':'#95A5A6'
};
const MONTHS_ZH = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

// ═══════════════════════════════════════════════════════
//  CSV 解析
//  每週記帳欄位：A=日期 B=大類 C=品項說明 D=金額 E=帳戶 F=備註
// ═══════════════════════════════════════════════════════
function parseCSV(text) {
  const rows = text.split(/\r?\n/);
  const data = {}; // { "6": { "🍽️ 飲食": { total, items[] } } }

  // Known non-data values to skip
  const SKIP_A = new Set(['日期','週小計','品項說明','']);
  const SKIP_B = new Set(['大類','','週小計','金額','帳戶']);

  for (let i = 0; i < rows.length; i++) {
    const cols = splitRow(rows[i]);
    if (cols.length < 3) continue;

    const rawA = cols[0]?.trim() ?? '';
    const rawB = cols[1]?.trim() ?? '';
    const rawC = cols[2]?.trim() ?? '';
    const rawD = cols[3]?.trim().replace(/,/g,'') ?? '';
    const rawE = cols[4]?.trim() ?? '現金';

    // Skip header / summary rows
    if (SKIP_A.has(rawA) || SKIP_B.has(rawB)) continue;
    if (rawA.includes('第') && rawA.includes('週')) continue;
    if (rawB.includes('第') && rawB.includes('週')) continue;
    if (rawA.includes('週小計') || rawB.includes('週小計')) continue;

    const dateObj = parseDate(rawA);
    if (!dateObj) continue;

    const amt = parseFloat(rawD);
    if (isNaN(amt) || amt <= 0) continue;

    // Category must look like an emoji category
    if (!rawB || rawB.length < 2) continue;

    const month = dateObj.getMonth() + 1;
    const mKey  = String(month);
    const mm    = String(month).padStart(2,'0');
    const dd    = String(dateObj.getDate()).padStart(2,'0');

    if (!data[mKey]) data[mKey] = {};
    if (!data[mKey][rawB]) data[mKey][rawB] = { total:0, items:[] };

    data[mKey][rawB].total += amt;
    data[mKey][rawB].items.push({ date:`${mm}/${dd}`, desc:rawC, amt, card:rawE });
  }

  // Sort items newest first within each category
  for (const m of Object.values(data))
    for (const c of Object.values(m))
      c.items.sort((a,b) => b.date.localeCompare(a.date));

  return data;
}

function splitRow(line) {
  const out = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; continue; }
    if (ch === ',' && !inQ) { out.push(cur); cur = ''; continue; }
    cur += ch;
  }
  out.push(cur);
  return out;
}

function parseDate(s) {
  if (!s) return null;
  // "2026/01/05" or "2026-01-05"
  let m = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  // Google Sheets sometimes exports as "2026年1月5日"
  m = s.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  // Excel serial number
  const n = parseInt(s);
  if (!isNaN(n) && n > 40000 && n < 60000)
    return new Date(Math.round((n - 25569) * 86400000));
  return null;
}

// ═══════════════════════════════════════════════════════
//  Data loading with proxy fallback
// ═══════════════════════════════════════════════════════
let MONTHLY_DATA = {};
let currentMonth = new Date().getMonth() + 1;
let pieChart = null, openCat = null;

function showToast(msg, dur=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

async function fetchWithFallback(url) {
  for (let i = 0; i < PROXIES.length; i++) {
    try {
      const proxyUrl = PROXIES[i](url);
      const res = await fetch(proxyUrl, { cache: 'no-cache' });
      if (!res.ok) continue;
      const text = await res.text();
      if (text && text.length > 50) return text;
    } catch(e) { /* try next */ }
  }
  throw new Error('所有代理均失敗');
}

async function loadData(manual=false) {
  const badge = document.getElementById('updBadge');
  badge.textContent = ' 載入中…';
  if (manual) showToast('🔄 更新中…');

  try {
    const text = await fetchWithFallback(CSV_URL);
    MONTHLY_DATA = parseCSV(text);

    const now = new Date();
    badge.textContent = ` ${now.getMonth()+1}/${now.getDate()} ${pad(now.getHours())}:${pad(now.getMinutes())} 更新`;

    buildMonthBar();

    // Auto-select the latest month that has data
    const months = Object.keys(MONTHLY_DATA).map(Number).filter(m =>
      Object.values(MONTHLY_DATA[String(m)]).some(c => c.items.length > 0)
    );
    if (months.length) currentMonth = Math.max(...months);
    selectMonth(currentMonth);

    if (manual) showToast('✅ 資料已更新');
  } catch(e) {
    badge.textContent = ' 載入失敗';
    document.getElementById('catList').innerHTML =
      `<div class="empty"><div class="empty-icon">⚠️</div>無法連線到 Google Sheets<br><small style="color:#CCC;margin-top:6px;display:block">${e.message}</small><br><button onclick="loadData(true)" style="margin-top:10px;padding:8px 20px;background:var(--navy);color:#fff;border:none;border-radius:20px;cursor:pointer;font-weight:600">重試</button></div>`;
    buildMonthBar();
    if (manual) showToast('❌ 載入失敗，請稍後重試');
  }
}

function pad(n){ return String(n).padStart(2,'0'); }

// ═══════════════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════════════
function buildMonthBar() {
  const bar = document.getElementById('monthBar');
  bar.innerHTML = '';
  MONTHS_ZH.forEach((label, i) => {
    const m = i + 1;
    const btn = document.createElement('button');
    btn.className = 'm-btn';
    btn.textContent = label;
    const mData = MONTHLY_DATA[String(m)] || {};
    const hasReal = Object.values(mData).some(c => c.items.length > 0);
    if (hasReal) btn.classList.add('has-data');
    if (m === currentMonth) btn.classList.add('active');
    btn.onclick = () => selectMonth(m);
    bar.appendChild(btn);
  });
}

function selectMonth(m) {
  currentMonth = m;
  document.querySelectorAll('.m-btn').forEach((b,i) => b.classList.toggle('active', i===m-1));
  document.querySelectorAll('.m-btn')[m-1]?.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  openCat = null;
  render();
}

function fmt(n){ return 'NT$' + Math.round(n).toLocaleString('zh-TW'); }

function render() {
  const mData = MONTHLY_DATA[String(currentMonth)] || {};
  const cats  = Object.entries(mData).sort((a,b) => b[1].total - a[1].total);
  const total = cats.reduce((s,[,v]) => s+v.total, 0);
  const diff  = TOTAL_BUDGET - total;

  document.getElementById('sumTotal').textContent  = total ? fmt(total) : '—';
  document.getElementById('sumBudget').textContent = fmt(TOTAL_BUDGET);
  const diffEl = document.getElementById('sumDiff');
  if (total) {
    diffEl.textContent = (diff>=0?'＋':'') + fmt(diff);
    diffEl.className   = 's-value ' + (diff>=0?'green':'red');
  } else {
    diffEl.textContent = '—';
    diffEl.className   = 's-value';
  }

  if (pieChart) { pieChart.destroy(); pieChart = null; }
  const listEl = document.getElementById('catList');

  if (!total) {
    listEl.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>本月尚無記錄</div>';
    return;
  }

  const ctx = document.getElementById('pieChart').getContext('2d');
  pieChart = new Chart(ctx, {
    type:'pie',
    data:{
      labels: cats.map(([c]) => c.slice(0,2)+' '+c.slice(2).trim()),
      datasets:[{
        data: cats.map(([,v]) => v.total),
        backgroundColor: cats.map(([c]) => CAT_COLORS[c]||'#ccc'),
        borderColor:'#fff', borderWidth:2.5, hoverOffset:14
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label(ctx){return ` ${fmt(ctx.raw)}（${(ctx.raw/total*100).toFixed(1)}%）`;}}}
      },
      onClick(evt,items){ if(items.length) toggleCat(cats[items[0].index][0],true); }
    }
  });

  listEl.innerHTML = '';
  cats.forEach(([cat, catData]) => {
    const budget   = BUDGETS[cat] || 0;
    const pct      = budget > 0 ? catData.total/budget : 0;
    const color    = CAT_COLORS[cat] || '#ccc';
    const barColor = pct>=1?'#E74C3C':pct>=.8?'#F39C12':'#27AE60';
    const isOpen   = openCat === cat;
    const over     = budget > 0 && catData.total > budget;

    const item = document.createElement('div');
    item.className = 'cat-item' + (isOpen?' open':'');
    item.id = 'cat-' + encodeURIComponent(cat);
    item.style.borderLeftColor = color;
    item.innerHTML = `
      <div class="cat-icon">${cat.slice(0,2)}</div>
      <div class="cat-info">
        <div class="cat-name">${cat.slice(2).trim()}${over?'<span class="over-badge">超支</span>':''}</div>
        <div class="cat-row2">
          <span class="cat-amt" style="color:${over?'#E74C3C':color}">${fmt(catData.total)}</span>
          ${budget?`<span class="cat-budget-info">預算${fmt(budget)}</span>`:''}
          <span class="cat-pct-badge">${(catData.total/total*100).toFixed(1)}%</span>
        </div>
        ${budget?`<div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,pct*100).toFixed(1)}%;background:${barColor}"></div></div>`:''}
      </div>
      <div class="arrow">›</div>`;
    item.addEventListener('click', () => toggleCat(cat, false));
    listEl.appendChild(item);

    const panel = document.createElement('div');
    panel.className = 'detail-panel' + (isOpen?' open':'');
    panel.id = 'panel-' + encodeURIComponent(cat);
    const items = catData.items || [];
    panel.innerHTML = items.length
      ? `<div class="detail-header"><span>共 <strong>${items.length}</strong> 筆</span><strong>${fmt(items.reduce((s,r)=>s+r.amt,0))}</strong></div>
         ${items.map(it=>`<div class="detail-row">
           <span class="d-date">${it.date}</span>
           <span class="d-desc">${it.desc||'（無說明）'}</span>
           <span class="d-card">${it.card||''}</span>
           <span class="d-amt${it.amt>=5000?' big':''}">${fmt(it.amt)}</span>
         </div>`).join('')}`
      : '<div style="padding:12px 14px;font-size:12px;color:#AAA">無詳細記錄</div>';
    listEl.appendChild(panel);
  });
}

function toggleCat(cat, scroll) {
  const key   = encodeURIComponent(cat);
  const item  = document.getElementById('cat-'+key);
  const panel = document.getElementById('panel-'+key);
  if (openCat === cat) {
    openCat = null;
    item?.classList.remove('open');
    panel?.classList.remove('open');
  } else {
    if (openCat) {
      const ok = encodeURIComponent(openCat);
      document.getElementById('cat-'+ok)?.classList.remove('open');
      document.getElementById('panel-'+ok)?.classList.remove('open');
    }
    openCat = cat;
    item?.classList.add('open');
    panel?.classList.add('open');
    if (scroll && item) setTimeout(()=>item.scrollIntoView({behavior:'smooth',block:'center'}),200);
  }
}

// ── Init ──────────────────────────────────────────────────
buildMonthBar();
loadData();
</script>
</body>
</html>
