<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0F1923">
<title>家庭財務 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0F1923;--surface:#162230;--card:#1C2D3E;--border:#243548;
  --accent:#3DD9B3;--warn:#F5A623;--danger:#E85555;--blue:#4A9EFF;--purple:#A78BFA;
  --txt:#E8EDF2;--txt2:#8BA0B8;--txt3:#4A6580;
  --radius:16px;--radius-s:10px;--safe-b:env(safe-area-inset-bottom,0px);
}
body{font-family:-apple-system,'Noto Sans TC',sans-serif;background:var(--bg);color:var(--txt);
     height:100vh;height:100dvh;overflow:hidden;-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:480px;margin:0 auto}
.pages{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(72px + var(--safe-b));scrollbar-width:none}
.pages::-webkit-scrollbar{display:none}
.page{display:none;padding:16px 16px 0;animation:fadeIn .2s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
     background:rgba(15,25,35,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
     border-top:1px solid var(--border);padding:8px 0 calc(8px + var(--safe-b));
     display:flex;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;
          cursor:pointer;border:none;background:none;color:var(--txt3);font-size:10px;
          font-weight:600;letter-spacing:.02em;transition:color .15s}
.nav-btn.active{color:var(--accent)}
.nav-btn .icon{font-size:22px;line-height:1}
.card{background:var(--card);border-radius:var(--radius);padding:16px;
      margin-bottom:12px;border:1px solid var(--border)}
.card-title{font-size:11px;font-weight:700;color:var(--txt3);
            text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.month-bar{display:flex;overflow-x:auto;gap:6px;padding:2px 0 10px;scrollbar-width:none}
.month-bar::-webkit-scrollbar{display:none}
.m-btn{flex-shrink:0;min-width:44px;padding:7px 12px;border-radius:20px;
        border:1.5px solid var(--border);font-size:12px;font-weight:600;
        cursor:pointer;background:none;color:var(--txt3);transition:all .15s}
.m-btn.active{background:var(--accent);color:#0F1923;border-color:var(--accent)}
.m-btn.has-data{border-color:rgba(61,217,179,.4);color:var(--accent)}
.hero{background:linear-gradient(135deg,var(--surface),#1a2f44);
      border-radius:var(--radius);padding:20px;margin-bottom:12px;
      border:1px solid var(--border);position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;top:-40px;right:-40px;width:160px;height:160px;
              background:radial-gradient(circle,rgba(61,217,179,.08),transparent 70%)}
.hero-label{font-size:11px;color:var(--txt3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.hero-value{font-size:36px;font-weight:800;letter-spacing:-.03em;line-height:1.1}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--card);border-radius:var(--radius-s);padding:14px;border:1px solid var(--border)}
.stat-label{font-size:10px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.stat-value{font-size:20px;font-weight:700;line-height:1}
.green{color:var(--accent)}.red{color:var(--danger)}.gold{color:var(--warn)}.blue{color:var(--blue)}
.cat-item{cursor:pointer;border-radius:var(--radius-s);overflow:hidden;margin-bottom:6px;border:1px solid var(--border)}
.cat-head{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--card);transition:background .1s}
.cat-head:active{background:var(--surface)}
.cat-item.open .cat-head{background:var(--surface)}
.cat-icon-wrap{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.cat-body{flex:1;min-width:0}
.cat-name{font-size:13px;font-weight:700}
.cat-meta{display:flex;align-items:center;gap:8px;margin-top:3px}
.cat-amt{font-size:15px;font-weight:800}
.cat-budget{font-size:10px;color:var(--txt3)}
.cat-pct{margin-left:auto;font-size:11px;color:var(--txt3)}
.progress{height:3px;background:var(--border);border-radius:2px;margin-top:5px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .5s}
.chevron{font-size:14px;color:var(--txt3);flex-shrink:0;transition:transform .2s;margin-left:4px}
.cat-item.open .chevron{transform:rotate(90deg)}
.detail-wrap{max-height:0;overflow:hidden;transition:max-height .3s ease}
.detail-wrap.open{max-height:1200px}
.detail-hdr{display:flex;justify-content:space-between;padding:8px 14px;
             font-size:11px;color:var(--txt3);background:var(--surface);border-top:1px solid var(--border)}
.detail-row{display:flex;align-items:center;gap:8px;padding:9px 14px;
             border-top:1px solid var(--border);background:var(--surface)}
.d-date{font-size:11px;color:var(--txt3);width:36px;flex-shrink:0;font-weight:600}
.d-desc{flex:1;font-size:12px;color:var(--txt);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d-card{font-size:10px;color:var(--txt3);flex-shrink:0;max-width:50px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d-amt{font-size:13px;font-weight:700;flex-shrink:0;text-align:right;min-width:52px}
.d-amt.big{color:var(--danger)}
.empty{text-align:center;padding:40px 20px;color:var(--txt3);font-size:13px}
.chart-wrap{height:240px;position:relative;margin:4px 0 12px}
.updated-tag{font-size:10px;background:rgba(61,217,179,.15);color:var(--accent);
              padding:3px 8px;border-radius:10px;margin-left:8px;font-weight:600}
</style>
</head>
<body>
<div class="app">
  <div class="pages" id="pages">
    <!-- 總覽 -->
    <div class="page active" id="pg-overview">
      <div class="month-bar" id="ovMonths"></div>
      <div class="hero">
        <div class="hero-label">本月總支出</div>
        <div class="hero-value red" id="ov-total">—</div>
        <div style="font-size:13px;color:var(--txt2);margin-top:6px" id="ov-sub">選擇月份查看</div>
      </div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">月預算上限</div><div class="stat-value gold" id="ov-budget">—</div></div>

        <div class="stat-card"><div class="stat-label">最大支出</div><div class="stat-value" id="ov-top">—</div></div>
        <div class="stat-card"><div class="stat-label">消費筆數</div><div class="stat-value blue" id="ov-count">—</div></div>
      </div>
      <div style="font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;margin:16px 0 10px">各類別概覽</div>
      <div id="ovCats"></div>
    </div>
    <!-- 支出 -->
    <div class="page" id="pg-expense">
      <div class="month-bar" id="expMonths"></div>
      <div class="card">
        <div class="card-title">支出比例 <span class="updated-tag">✅ 6/13已更新</span></div>
        <div class="chart-wrap"><canvas id="pieChart" style="cursor:pointer"></canvas></div>
      </div>
      <div id="catList"></div>
    </div>
    <!-- 收入 -->
    <div class="page" id="pg-income">
      <div class="month-bar" id="incMonths"></div>
      <div class="card" style="margin-bottom:12px">
        <div class="card-title">本月收入合計</div>
        <div style="font-size:28px;font-weight:800;color:var(--accent)" id="inc-total">—</div>
      </div>
      <div id="incList"></div>
    </div>
    <!-- 資產 -->
    <div class="page" id="pg-asset">
      <div class="card">
        <div class="card-title">家庭總資產</div>
        <div style="font-size:28px;font-weight:800;color:#A78BFA" id="asset-total">請填入帳戶餘額</div>
        <div style="font-size:12px;color:var(--txt3);margin-top:4px">9個帳戶加總</div>
      </div>
      <div style="font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;margin:16px 0 10px">各帳戶餘額 — 每月2號更新</div>
      <div class="card" id="assetInputs"></div>
    </div>
    <!-- 保險 -->
    <div class="page" id="pg-insurance">
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px" id="insGrid"></div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div class="card-title" style="margin:0">本月保費合計</div>
          <div style="font-size:20px;font-weight:700;color:var(--warn)" id="ins-total">—</div>
        </div>
        <div id="insDetail"></div>
      </div>
    </div>
  </div>
  <nav class="nav">
    <button class="nav-btn active" onclick="sw('overview',this)"><span class="icon">📊</span>總覽</button>
    <button class="nav-btn" onclick="sw('expense',this)"><span class="icon">💸</span>支出</button>
    <button class="nav-btn" onclick="sw('income',this)"><span class="icon">💰</span>收入</button>
    <button class="nav-btn" onclick="sw('asset',this)"><span class="icon">🏦</span>資產</button>
    <button class="nav-btn" onclick="sw('insurance',this)"><span class="icon">🛡️</span>保險</button>
  </nav>
</div>

    btn.onclick=()=>{el.querySelectorAll(".m-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");btn.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});onSel(i+1);};
    el.appendChild(btn);
  });
}

function renderOverview(m){
  const mData=MD[String(m)]||{};
  const cats=Object.entries(mData).sort((a,b)=>b[1].total-a[1].total);
  const total=cats.reduce((s,[,v])=>s+v.total,0);
  const count=cats.reduce((s,[,v])=>s+(v.items?.length||0),0);
  const diff=TB-total;const topCat=cats[0];
  document.getElementById("ov-total").textContent=total?fmt(total):"無資料";
  document.getElementById("ov-budget").textContent=fmt(TB);
  const de=document.getElementById("ov-diff");de.textContent=(diff>=0?"＋":"")+fmt(diff);de.className="stat-value "+(diff>=0?"green":"red");
  document.getElementById("ov-top").textContent=topCat?topCat[0].slice(0,4):"—";
  document.getElementById("ov-count").textContent=count?count+"筆":"—";
  document.getElementById("ov-sub").textContent=total?"月預算使用 "+(total/TB*100).toFixed(0)+"%":"本月尚無記錄";
  const el=document.getElementById("ovCats");el.innerHTML="";
  cats.forEach(([cat,cd])=>{
    const b=BU[cat]||0,pct=b?cd.total/b:0,color=CC[cat]||"#ccc",barCol=pct>=1?"var(--danger)":pct>=.8?"var(--warn)":"var(--accent)";
    const d=document.createElement("div");d.className="card";d.style.cssText="padding:12px 14px;margin-bottom:8px";
    d.innerHTML=`<div style="display:flex;align-items:center;gap:10px">
      <div style="width:34px;height:34px;border-radius:10px;background:${color}22;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${cat.slice(0,2)}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:13px;font-weight:700">${cat.slice(2).trim()}</span>
          <span style="font-size:14px;font-weight:700;color:${pct>=1?"var(--danger)":color}">${fmt(cd.total)}</span>
        </div>
        ${b?`<div class="progress" style="margin-top:6px"><div class="progress-fill" style="width:${Math.min(100,pct*100).toFixed(1)}%;background:${barCol}"></div></div><div style="font-size:10px;color:var(--txt3);margin-top:3px">預算${fmt(b)}｜剩餘<span style="color:${pct>=1?"var(--danger)":"var(--accent)"}">${fmt(b-cd.total)}</span></div>`:""}
      </div></div>`;
    el.appendChild(d);
  });
}

function renderExpense(m){
  const mData=MD[String(m)]||{};
  const cats=Object.entries(mData).sort((a,b)=>b[1].total-a[1].total);
  const total=cats.reduce((s,[,v])=>s+v.total,0);
  if(pieChart)pieChart.destroy();
  if(total){
    const ctx=document.getElementById("pieChart").getContext("2d");
    pieChart=new Chart(ctx,{type:"pie",data:{labels:cats.map(([c])=>c.slice(0,2)+" "+c.slice(2).trim()),datasets:[{data:cats.map(([,v])=>v.total),backgroundColor:cats.map(([c])=>CC[c]||"#ccc"),borderColor:"#162230",borderWidth:2,hoverOffset:12}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label(c){return " "+fmt(c.raw)+"（"+(c.raw/total*100).toFixed(1)+"%）";}}}},
    onClick(e,items){if(!items.length)return;toggleCat(cats[items[0].index][0],true);}}});
  }
  openCat=null;
  const listEl=document.getElementById("catList");listEl.innerHTML="";
  if(!total){listEl.innerHTML='<div class="empty">本月尚無支出記錄</div>';return;}
  cats.forEach(([cat,cd])=>{
    const b=BU[cat]||0,pct=b?cd.total/b:0,color=CC[cat]||"#ccc",barCol=pct>=1?"var(--danger)":pct>=.8?"var(--warn)":"var(--accent)",key=encodeURIComponent(cat);
    const wrap=document.createElement("div");wrap.className="cat-item";wrap.id="cat-"+key;
    wrap.innerHTML=`<div class="cat-head" onclick="toggleCat('${cat.replace(/'/g,"\'")}',false)">
      <div class="cat-icon-wrap" style="background:${color}22">${cat.slice(0,2)}</div>
      <div class="cat-body">
        <div class="cat-name">${cat.slice(2).trim()}</div>
        <div class="cat-meta"><span class="cat-amt" style="color:${pct>=1?"var(--danger)":color}">${fmt(cd.total)}</span>${b?`<span class="cat-budget">預算${fmt(b)}</span>`:""}<span class="cat-pct">${(cd.total/total*100).toFixed(1)}%</span></div>
        ${b?`<div class="progress"><div class="progress-fill" style="width:${Math.min(100,pct*100).toFixed(1)}%;background:${barCol}"></div></div>`:""}
      </div><span class="chevron">›</span></div>
      <div class="detail-wrap" id="panel-${key}">
        <div class="detail-hdr"><span>${(cd.items||[]).length}筆</span><strong>${fmt(cd.total)}</strong></div>
        ${(cd.items||[]).map(it=>`<div class="detail-row"><span class="d-date">${it.date}</span><span class="d-desc">${it.desc||"（無說明）"}</span><span class="d-card">${sc(it.card)}</span><span class="d-amt${it.amt>=5000?" big":""}">${fmt(it.amt)}</span></div>`).join("")}
      </div>`;
    listEl.appendChild(wrap);
  });
}

function toggleCat(cat,scroll){
  const key=encodeURIComponent(cat);const item=document.getElementById("cat-"+key);const panel=document.getElementById("panel-"+key);
  if(openCat===cat){openCat=null;item?.classList.remove("open");panel?.classList.remove("open");}
  else{if(openCat){const ok=encodeURIComponent(openCat);document.getElementById("cat-"+ok)?.classList.remove("open");document.getElementById("panel-"+ok)?.classList.remove("open");}
    openCat=cat;item?.classList.add("open");panel?.classList.add("open");
    if(scroll&&item)setTimeout(()=>item.scrollIntoView({behavior:"smooth",block:"center"}),200);}
}

function renderIncome(m){
  document.getElementById("inc-total").textContent="—（薪水未填入）";
  document.getElementById("incList").innerHTML=`<div class="card"><div class="card-title">股利、薪資等</div><div style="font-size:13px;color:var(--txt3)">請在 Excel「💰 收入記錄」填入薪水與股利，App 下次更新時自動同步。</div></div>`;
}

function initAsset(){
  const saved=JSON.parse(localStorage.getItem("assets")||"{}");
  const el=document.getElementById("assetInputs");el.innerHTML="";
  let total=0;
  ACCS.forEach((acc,i)=>{
    const v=parseFloat(saved[i]||0);if(!isNaN(v)&&v>0)total+=v;
    const row=document.createElement("div");row.style.cssText="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)";
    row.innerHTML=`<div style="width:10px;height:10px;border-radius:50%;background:${acc.c};flex-shrink:0"></div>
      <div style="flex:1"><div style="font-size:13px;font-weight:600">${acc.n}</div><div style="font-size:10px;color:var(--txt3)">${acc.o}</div></div>
      <input id="a-${i}" type="number" inputmode="numeric" placeholder="餘額"
             style="background:var(--surface);border:1.5px solid var(--border);border-radius:8px;color:var(--txt);font-size:14px;text-align:center;padding:6px 8px;width:110px;outline:none"
             value="${saved[i]||""}" oninput="updateAssetTot()">`;
    el.appendChild(row);
  });
  const btn=document.createElement("button");
  btn.style.cssText="margin-top:12px;background:var(--accent);color:#0F1923;border:none;border-radius:var(--radius-s);padding:12px;font-size:14px;font-weight:700;width:100%;cursor:pointer";
  btn.textContent="💾  儲存帳戶餘額";btn.onclick=saveAsset;el.appendChild(btn);
  document.getElementById("asset-total").textContent=total>0?fmt(total):"請填入帳戶餘額";
}
function updateAssetTot(){let t=0;ACCS.forEach((_,i)=>{const v=parseFloat(document.getElementById("a-"+i)?.value||0);if(!isNaN(v))t+=v;});document.getElementById("asset-total").textContent=t>0?fmt(t):"請填入帳戶餘額";}
function saveAsset(){const d={};ACCS.forEach((_,i)=>{const v=document.getElementById("a-"+i)?.value;if(v)d[i]=parseFloat(v);});localStorage.setItem("assets",JSON.stringify(d));document.getElementById("asset-total").style.color="#3DD9B3";}

function initInsurance(){
  const grid=document.getElementById("insGrid");grid.innerHTML="";
  INS.forEach((ins,i)=>{
    const cell=document.createElement("div");
    const hi=ins.t>20000;const med_=ins.t>10000;
    cell.style.cssText=`background:var(--card);border-radius:var(--radius-s);padding:8px;text-align:center;border:1px solid ${i===5?"var(--accent)":"var(--border)"};cursor:pointer`;
    cell.innerHTML=`<div style="font-size:12px;font-weight:700">${MZ[i]}</div><div style="font-size:10px;color:${hi?"var(--danger)":med_?"var(--warn)":"var(--txt3)"};margin-top:3px">${ins.t?(ins.t/1000).toFixed(0)+"K":"—"}</div>`;
    cell.onclick=()=>{grid.querySelectorAll("div").forEach(c=>c.style.borderColor="var(--border)");cell.style.borderColor="var(--accent)";renderIns(i+1);};
    grid.appendChild(cell);
  });
  renderIns(6);
}
function renderIns(m){
  const ins=INS.find(i=>i.m===m);
  document.getElementById("ins-total").textContent=ins?fmt(ins.t):"—";
  document.getElementById("insDetail").innerHTML=`<div style="font-size:13px;color:var(--txt2)">詳細保費明細請查閱 Excel「🛡️ 保險月曆」。</div>`;
}

function selM(m){
  curM=m;
  ["ovMonths","expMonths","incMonths"].forEach(id=>{const el=document.getElementById(id);if(!el)return;el.querySelectorAll(".m-btn").forEach((b,i)=>b.classList.toggle("active",i===m-1));});
  if(cur==="overview")renderOverview(m);
  else if(cur==="expense")renderExpense(m);
  else if(cur==="income")renderIncome(m);
}

function sw(name,btn){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("pg-"+name).classList.add("active");
  btn.classList.add("active");document.getElementById("pages").scrollTop=0;cur=name;
  if(name==="overview")renderOverview(curM);
  else if(name==="expense")renderExpense(curM);
  else if(name==="income")renderIncome(curM);
  else if(name==="asset")initAsset();
  else if(name==="insurance")initInsurance();
}

["ovMonths","expMonths","incMonths"].forEach(id=>buildMonths(id,m=>selM(m),curM));
renderOverview(curM);
</script>
</body>
</html>
