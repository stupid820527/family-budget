<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>🏠 家庭支出分析 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#1B4F72;--blue:#2E86C1;
  --green:#1E8449;--red:#C0392B;--lred:#FADBD8;
  --gold:#9A7D0A;--grey:#F2F3F4;--dark:#212F3D;
  --radius:14px;--shadow:0 2px 14px rgba(0,0,0,0.09);
}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:#EEF2F7;color:var(--dark);min-height:100vh;padding-bottom:40px}

.header{background:linear-gradient(135deg,#1B4F72,#2E86C1);color:#fff;padding:18px 20px 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.header-row{display:flex;align-items:center;justify-content:space-between}
.header-title{font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px}
.upd-badge{font-size:10px;background:rgba(255,255,255,.18);border-radius:12px;padding:2px 9px}
.header-sub{font-size:11px;opacity:.7;margin-top:3px}
.year-badge{background:rgba(255,255,255,.2);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700}
.icon-btn{background:rgba(255,255,255,.18);border:none;color:#fff;font-size:14px;padding:6px 11px;border-radius:20px;cursor:pointer;margin-left:6px}
.icon-btn:active{background:rgba(255,255,255,.35)}

.month-bar{display:flex;overflow-x:auto;gap:6px;padding:12px 16px;background:#fff;border-bottom:1px solid #E0E6ED;position:sticky;top:62px;z-index:99;scrollbar-width:none}
.month-bar::-webkit-scrollbar{display:none}
.m-btn{flex-shrink:0;min-width:44px;padding:7px 12px;border-radius:20px;border:1.5px solid #DDE3ED;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#666;transition:all .15s}
.m-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.m-btn.has-data{border-color:#aac4dc;color:var(--navy)}

.content{padding:14px 14px 0;max-width:520px;margin:0 auto}
.card{background:#fff;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:13px}
.card-title{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}

.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.s-item{background:var(--grey);border-radius:10px;padding:12px 8px;text-align:center}
.s-label{font-size:10px;color:#999;margin-bottom:4px}
.s-value{font-size:17px;font-weight:800;color:var(--dark)}
.s-value.red{color:var(--red)}.s-value.green{color:var(--green)}.s-value.gold{color:var(--gold)}

.chart-hint{font-size:11px;color:#999;text-align:center;margin-bottom:10px}
.chart-wrap{position:relative;height:240px}

.cat-list{display:flex;flex-direction:column}
.cat-item{padding:13px 14px;cursor:pointer;border-left:4px solid transparent;display:flex;align-items:center;gap:11px;border-bottom:1px solid #F0F4F8;transition:background .1s}
.cat-item:last-child{border-bottom:none}
.cat-item.open{background:#FAFBFF}
.cat-icon{font-size:20px;flex-shrink:0;width:32px;text-align:center}
.cat-info{flex:1;min-width:0}
.cat-name{font-size:13px;font-weight:700}
.cat-row2{display:flex;align-items:center;gap:8px;margin-top:3px}
.cat-amt{font-size:15px;font-weight:800}
.cat-budget-info{font-size:10px;color:#AAA}
.cat-pct-badge{margin-left:auto;background:var(--grey);border-radius:10px;padding:2px 7px;font-size:11px;font-weight:600;color:#666;flex-shrink:0}
.progress-bar{height:4px;background:#EEE;border-radius:2px;overflow:hidden;margin-top:5px}
.progress-fill{height:100%;border-radius:2px;transition:width .5s}
.arrow{font-size:13px;color:#CCC;transition:transform .2s;flex-shrink:0;margin-left:4px}
.cat-item.open .arrow{transform:rotate(90deg)}
.over-badge{background:var(--lred);color:var(--red);font-size:10px;font-weight:700;padding:2px 6px;border-radius:8px;flex-shrink:0;margin-left:4px}

/* Detail panel */
.detail-panel{background:#F5F8FF;overflow:hidden;max-height:0;transition:max-height .35s ease;border-bottom:1px solid #E8EEF8}
.detail-panel.open{max-height:9999px}
.detail-header{display:flex;justify-content:space-between;padding:9px 14px 7px;font-size:11px;color:#888;border-bottom:1px solid #E8EEF8;background:#EEF3FC}
.detail-header strong{color:var(--navy)}

/* Each transaction row — tap to expand note */
.tx-row{border-bottom:1px solid #EEF0F5}
.tx-row:last-child{border-bottom:none}
.tx-main{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer}
.tx-main:active{background:#EEF3FF}
.d-date{font-size:11px;color:#AAA;flex-shrink:0;width:38px;font-weight:600}
.d-desc{flex:1;font-size:12px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--dark)}
.d-acct{font-size:10px;color:#BBB;flex-shrink:0;max-width:44px;overflow:hidden;text-overflow:ellipsis;text-align:right}
.d-amt{font-size:13px;font-weight:700;flex-shrink:0;text-align:right;min-width:60px}
.d-amt.big{color:var(--red)}
.expand-arrow{font-size:11px;color:#CCC;flex-shrink:0;transition:transform .2s;margin-left:2px}
.tx-row.expanded .expand-arrow{transform:rotate(90deg)}

/* Full note panel */
.tx-note{max-height:0;overflow:hidden;transition:max-height .3s ease;background:#EEF5FF}
.tx-row.expanded .tx-note{max-height:400px}
.tx-note-inner{padding:10px 14px 12px;font-size:11px;color:#555;line-height:1.7;white-space:pre-wrap;word-break:break-all;border-top:1px dashed #D0DFF0}

.empty{text-align:center;padding:40px 20px;color:#BBB;font-size:13px}
.empty-icon{font-size:36px;margin-bottom:8px}

/* Upload zone */
.upload-zone{border:2px dashed #C5D8E8;border-radius:14px;padding:22px;text-align:center;cursor:pointer;transition:all .2s;background:#F8FBFF;margin-bottom:13px}
.upload-zone:hover,.upload-zone.drag{border-color:var(--blue);background:#EBF5FF}
.uz-icon{font-size:30px;margin-bottom:6px}
.uz-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:3px}
.uz-sub{font-size:11px;color:#888}
#fileInput{display:none}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1B4F72;color:#fff;font-size:12px;font-weight:600;padding:10px 20px;border-radius:20px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.drawer{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 44px;width:100%;max-width:520px}
.drawer h3{font-size:15px;font-weight:800;margin-bottom:14px}
.drawer label{font-size:11px;font-weight:700;color:#888;display:block;margin-bottom:5px;margin-top:14px}
.drawer input{width:100%;border:1.5px solid #DDE3ED;border-radius:10px;padding:10px 13px;font-size:12px;outline:none}
.drawer input:focus{border-color:var(--blue)}
.drawer .hint{font-size:10px;color:#AAA;margin-top:4px;line-height:1.6}
.btn-row{display:flex;gap:8px;margin-top:18px}
.btn{flex:1;padding:12px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer}
.btn-primary{background:var(--navy);color:#fff}
.btn-cancel{background:var(--grey);color:#666}

.skel{background:linear-gradient(90deg,#eee 25%,#f5f5f5 50%,#eee 75%);background-size:200% 100%;animation:sk 1.2s infinite;border-radius:8px;height:14px;margin-bottom:10px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div>
      <div class="header-title">🏠 家庭支出分析
        <span class="upd-badge" id="updBadge">—</span>
      </div>
      <div class="header-sub">天天記帳 CSV · 點明細可展開完整備註</div>
    </div>
    <div style="display:flex;align-items:center">
      <div class="year-badge">2026</div>
      <button class="icon-btn" onclick="openSettings()" title="設定">⚙️</button>
      <button class="icon-btn" id="refreshBtn" onclick="refreshSheet()" title="從 Sheets 更新">↺</button>
    </div>
  </div>
</div>

<div class="month-bar" id="monthBar"></div>

<div class="content">
  <div class="upload-zone" id="uploadZone"
       onclick="document.getElementById('fileInput').click()"
       ondragover="event.preventDefault();this.classList.add('drag')"
       ondragleave="this.classList.remove('drag')"
       ondrop="handleDrop(event)">
    <div class="uz-icon">📂</div>
    <div class="uz-title">上傳天天記帳 CSV</div>
    <div class="uz-sub">每週匯出後拖曳或點擊上傳，資料自動累積合併</div>
    <input type="file" id="fileInput" accept=".csv" onchange="handleFile(this.files[0])">
  </div>

  <div class="card">
    <div class="card-title">本月財務摘要</div>
    <div class="summary-grid">
      <div class="s-item"><div class="s-label">總支出</div><div class="s-value red" id="sumTotal">—</div></div>
      <div class="s-item"><div class="s-label">月預算</div><div class="s-value gold" id="sumBudget">—</div></div>
      <div class="s-item"><div class="s-label">超支／剩餘</div><div class="s-value" id="sumDiff">—</div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">支出比例</div>
    <div class="chart-hint">👆 點色塊查看該類別每筆明細</div>
    <div class="chart-wrap"><canvas id="pieChart"></canvas></div>
  </div>

  <div class="card" style="padding:0;overflow:hidden">
    <div style="padding:12px 14px 8px">
      <div class="card-title" style="margin-bottom:0">各類別明細 <span style="font-size:10px;color:#CCC;font-weight:400">（點每筆可展開完整備註）</span></div>
    </div>
    <div class="cat-list" id="catList">
      <div style="padding:20px">
        <div class="skel"></div><div class="skel" style="width:70%"></div><div class="skel" style="width:85%"></div>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeSettings()">
  <div class="drawer">
    <h3>⚙️ 設定</h3>
    <label>Google Sheets CSV 網址（選填，設定後 ↺ 可雲端更新）</label>
    <input id="sheetUrl" type="url" placeholder="https://docs.google.com/spreadsheets/d/e/.../pub?...&output=csv">
    <div class="hint">Sheets → 檔案 → 共用 → 發佈到網路 → CSV → 複製網址</div>
    <label>清除所有本機資料</label>
    <div class="btn-row" style="margin-top:8px">
      <button class="btn btn-cancel" onclick="clearData()" style="background:#FFF0F0;color:var(--red)">🗑 清除資料</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeSettings()">取消</button>
      <button class="btn btn-primary" onclick="saveSettings()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 類別對應 ──────────────────────────────────────────
const CAT_MAP = {
  '飲食':'🍽️ 飲食','居家開銷':'🏠 居家開銷','汽車':'🚗 汽車',
  '娛樂血拼':'🛍️ 娛樂血拚','娛樂血拚':'🛍️ 娛樂血拚',
  '看醫生':'🏥 看醫生','終身學習':'📚 終身學習','保險':'🛡️ 保險',
  '小孩學習':'👶 小孩學習','網路訂閱':'📱 網路訂閱',
  '小孩日用品':'🧸 小孩日用品','其他':'💬 其他',
};
const BUDGETS = {
  '🍽️ 飲食':24000,'🏠 居家開銷':8000,'🚗 汽車':4000,
  '🛍️ 娛樂血拚':8000,'🏥 看醫生':1500,'📚 終身學習':3000,
  '🛡️ 保險':14000,'👶 小孩學習':27600,'📱 網路訂閱':3500,
  '🧸 小孩日用品':5000,'💬 其他':1000,
};
const TOTAL_BUDGET = Object.values(BUDGETS).reduce((a,b)=>a+b,0);
const CAT_COLORS = {
  '🍽️ 飲食':'#FF8C42','🏠 居家開銷':'#4ECDC4','🚗 汽車':'#E74C3C',
  '🛍️ 娛樂血拚':'#9B59B6','🏥 看醫生':'#3498DB','📚 終身學習':'#27AE60',
  '🛡️ 保險':'#F39C12','👶 小孩學習':'#E91E8C','📱 網路訂閱':'#1ABC9C',
  '🧸 小孩日用品':'#E84393','💬 其他':'#95A5A6',
};
const MONTHS_ZH = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const STORE_KEY = 'fbv3_data';
const SHEET_KEY = 'fbv3_sheet';
const PROXIES = [
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
];

// ── State ─────────────────────────────────────────────
let DATA = {};   // { "6": { "🍽️ 飲食": { total, items[] } } }
let curMonth = new Date().getMonth()+1;
let pie = null, openCat = null;

// ── 天天記帳 CSV 解析 ─────────────────────────────────
// 欄位：日期,類別,大類別,金額,貨幣,成員,帳戶,標籤,備註,收支區分,...
function parseTianTian(text) {
  const out = {};
  const rows = text.split(/\r?\n/);
  for (let i=1; i<rows.length; i++) {
    const c = splitRow(rows[i]);
    if (c.length < 10) continue;
    const rawDate=c[0]?.trim(), cat=c[1]?.trim();
    const amt=parseFloat((c[3]||'').replace(/,/g,''));
    const acct=(c[6]||'現金').trim();
    const note=(c[8]||'').trim();
    const type=(c[9]||'').trim();
    if (type!=='支' || !rawDate || !cat || isNaN(amt) || amt<=0) continue;
    // date: YYYYMMDD
    const y=rawDate.slice(0,4), mo=rawDate.slice(4,6), d=rawDate.slice(6,8);
    const month=parseInt(mo,10); if(isNaN(month)) continue;
    const mapped = CAT_MAP[cat] || ('💬 '+cat);
    const mKey=String(month);
    if(!out[mKey]) out[mKey]={};
    if(!out[mKey][mapped]) out[mKey][mapped]={total:0,items:[]};
    out[mKey][mapped].total+=amt;
    out[mKey][mapped].items.push({date:`${mo}/${d}`,desc:note,amt,card:acct});
  }
  for(const m of Object.values(out))
    for(const c of Object.values(m))
      c.items.sort((a,b)=>b.date.localeCompare(a.date));
  return out;
}

function splitRow(line){
  const out=[]; let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){inQ=!inQ;continue;}
    if(ch===','&&!inQ){out.push(cur);cur='';continue;}
    cur+=ch;
  }
  out.push(cur); return out;
}

function mergeData(base, inc){
  const res=JSON.parse(JSON.stringify(base));
  for(const[mKey,mData] of Object.entries(inc)){
    if(!res[mKey]) res[mKey]={};
    for(const[cat,cd] of Object.entries(mData)){
      if(!res[mKey][cat]){res[mKey][cat]=cd;continue;}
      const seen=new Set(res[mKey][cat].items.map(i=>`${i.date}|${i.amt}|${i.desc.slice(0,20)}`));
      for(const it of cd.items){
        const k=`${it.date}|${it.amt}|${it.desc.slice(0,20)}`;
        if(!seen.has(k)){res[mKey][cat].items.push(it);res[mKey][cat].total+=it.amt;seen.add(k);}
      }
      res[mKey][cat].items.sort((a,b)=>b.date.localeCompare(a.date));
    }
  }
  return res;
}

// ── File upload ───────────────────────────────────────
function handleDrop(e){
  e.preventDefault();
  document.getElementById('uploadZone').classList.remove('drag');
  const f=e.dataTransfer.files[0]; if(f) handleFile(f);
}
function handleFile(file){
  if(!file) return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const newData=parseTianTian(e.target.result);
      const months=Object.keys(newData);
      if(!months.length){showToast('⚠️ 未解析到支出資料');return;}
      const saved=JSON.parse(localStorage.getItem(STORE_KEY)||'{}');
      DATA=mergeData(saved,newData);
      localStorage.setItem(STORE_KEY,JSON.stringify(DATA));
      const total=Object.values(newData).flatMap(m=>Object.values(m)).reduce((s,c)=>s+c.items.length,0);
      document.getElementById('updBadge').textContent=`📂 ${file.name.slice(0,18)}`;
      buildMonthBar();
      selectMonth(Math.max(...months.map(Number)));
      showToast(`✅ 已載入 ${total} 筆，${months.join('、')} 月`);
    }catch(err){showToast('❌ 解析失敗：'+err.message);}
  };
  r.readAsText(file,'utf-8');
}

// ── Google Sheets ─────────────────────────────────────
async function refreshSheet(){
  const url=localStorage.getItem(SHEET_KEY);
  if(!url){showToast('請先在 ⚙️ 設定 Sheets 網址');return;}
  document.getElementById('refreshBtn').textContent='…';
  try{
    let text='';
    for(const proxy of PROXIES){
      try{const res=await fetch(proxy(url),{cache:'no-cache'});if(res.ok){text=await res.text();if(text.length>50)break;}}catch(e){}
    }
    if(!text) throw new Error('無法連線');
    // Sheets CSV: A=日期 B=大類 C=品項 D=金額 E=帳戶
    const newData=parseSheetsCSV(text);
    const saved=JSON.parse(localStorage.getItem(STORE_KEY)||'{}');
    DATA=mergeData(saved,newData);
    localStorage.setItem(STORE_KEY,JSON.stringify(DATA));
    const now=new Date();
    document.getElementById('updBadge').textContent=`☁️ ${now.getMonth()+1}/${now.getDate()} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
    buildMonthBar(); selectMonth(curMonth);
    showToast('✅ 已從 Google Sheets 更新');
  }catch(e){showToast('❌ '+e.message);}
  finally{document.getElementById('refreshBtn').textContent='↺';}
}

function parseSheetsCSV(text){
  const out={}, rows=text.split(/\r?\n/);
  const SKIP=new Set(['日期','週小計','大類','品項說明','']);
  for(let i=1;i<rows.length;i++){
    const c=splitRow(rows[i]);
    if(c.length<4)continue;
    const rawA=c[0]?.trim(),rawB=c[1]?.trim(),rawC=c[2]?.trim()||'',rawD=(c[3]||'').replace(/,/g,''),rawE=(c[4]||'現金').trim();
    if(SKIP.has(rawA)||SKIP.has(rawB))continue;
    if(rawA.includes('第')&&rawA.includes('週'))continue;
    const d=parseDate(rawA); if(!d)continue;
    const amt=parseFloat(rawD); if(isNaN(amt)||amt<=0)continue;
    const cat=CAT_MAP[rawB]||rawB;
    const mKey=String(d.getMonth()+1);
    const mm=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
    if(!out[mKey])out[mKey]={};
    if(!out[mKey][cat])out[mKey][cat]={total:0,items:[]};
    out[mKey][cat].total+=amt;
    out[mKey][cat].items.push({date:`${mm}/${dd}`,desc:rawC,amt,card:rawE});
  }
  for(const m of Object.values(out)) for(const c of Object.values(m)) c.items.sort((a,b)=>b.date.localeCompare(a.date));
  return out;
}

function parseDate(s){
  if(!s)return null;
  let m=s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if(m)return new Date(+m[1],+m[2]-1,+m[3]);
  const n=parseInt(s);
  if(!isNaN(n)&&n>40000&&n<60000)return new Date(Math.round((n-25569)*86400000));
  return null;
}

function pad(n){return String(n).padStart(2,'0');}

// ── Settings ──────────────────────────────────────────
function openSettings(){document.getElementById('sheetUrl').value=localStorage.getItem(SHEET_KEY)||'';document.getElementById('overlay').classList.add('open');}
function closeSettings(){document.getElementById('overlay').classList.remove('open');}
function saveSettings(){
  const u=document.getElementById('sheetUrl').value.trim();
  if(u)localStorage.setItem(SHEET_KEY,u); else localStorage.removeItem(SHEET_KEY);
  closeSettings(); showToast('✅ 設定已儲存');
}
function clearData(){
  if(!confirm('確定清除所有本機記帳資料？'))return;
  localStorage.removeItem(STORE_KEY);
  DATA={}; buildMonthBar(); selectMonth(curMonth);
  closeSettings(); showToast('已清除');
}

// ── Toast ─────────────────────────────────────────────
let _tt;
function showToast(msg,dur=3000){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),dur);
}

// ── UI ────────────────────────────────────────────────
function buildMonthBar(){
  const bar=document.getElementById('monthBar');
  bar.innerHTML='';
  MONTHS_ZH.forEach((lbl,i)=>{
    const m=i+1, btn=document.createElement('button');
    btn.className='m-btn'; btn.textContent=lbl;
    if(Object.values(DATA[String(m)]||{}).some(c=>c.items.length)) btn.classList.add('has-data');
    if(m===curMonth) btn.classList.add('active');
    btn.onclick=()=>selectMonth(m);
    bar.appendChild(btn);
  });
}

function selectMonth(m){
  curMonth=m;
  document.querySelectorAll('.m-btn').forEach((b,i)=>b.classList.toggle('active',i===m-1));
  document.querySelectorAll('.m-btn')[m-1]?.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  openCat=null; render();
}

function fmt(n){return 'NT$'+Math.round(n).toLocaleString('zh-TW');}

function render(){
  const mData=DATA[String(curMonth)]||{};
  const cats=Object.entries(mData).sort((a,b)=>b[1].total-a[1].total);
  const total=cats.reduce((s,[,v])=>s+v.total,0);
  const diff=TOTAL_BUDGET-total;

  document.getElementById('sumTotal').textContent=total?fmt(total):'—';
  document.getElementById('sumBudget').textContent=fmt(TOTAL_BUDGET);
  const de=document.getElementById('sumDiff');
  if(total){de.textContent=(diff>=0?'＋':'')+fmt(diff);de.className='s-value '+(diff>=0?'green':'red');}
  else{de.textContent='—';de.className='s-value';}

  if(pie){pie.destroy();pie=null;}
  const listEl=document.getElementById('catList');

  if(!total){
    listEl.innerHTML='<div class="empty"><div class="empty-icon">📭</div>本月尚無資料<br><small style="color:#CCC;margin-top:6px;display:block">上傳天天記帳 CSV 即可</small></div>';
    return;
  }

  const ctx=document.getElementById('pieChart').getContext('2d');
  pie=new Chart(ctx,{
    type:'pie',
    data:{
      labels:cats.map(([c])=>c.slice(0,2)+' '+c.slice(2).trim()),
      datasets:[{data:cats.map(([,v])=>v.total),backgroundColor:cats.map(([c])=>CAT_COLORS[c]||'#ccc'),borderColor:'#fff',borderWidth:2.5,hoverOffset:14}]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label(ctx){return ` ${fmt(ctx.raw)}（${(ctx.raw/total*100).toFixed(1)}%）`;}}}}  ,
      onClick(e,items){if(items.length)toggleCat(cats[items[0].index][0],true);}
    }
  });

  listEl.innerHTML='';
  cats.forEach(([cat,cd])=>{
    const budget=BUDGETS[cat]||0, pct=budget>0?cd.total/budget:0;
    const color=CAT_COLORS[cat]||'#ccc';
    const barColor=pct>=1?'#E74C3C':pct>=.8?'#F39C12':'#27AE60';
    const isOpen=openCat===cat, over=budget>0&&cd.total>budget;
    const key=encodeURIComponent(cat);

    const item=document.createElement('div');
    item.className='cat-item'+(isOpen?' open':'');
    item.id='cat-'+key; item.style.borderLeftColor=color;
    item.innerHTML=`
      <div class="cat-icon">${cat.slice(0,2)}</div>
      <div class="cat-info">
        <div class="cat-name">${cat.slice(2).trim()}${over?'<span class="over-badge">超支</span>':''}</div>
        <div class="cat-row2">
          <span class="cat-amt" style="color:${over?'#E74C3C':color}">${fmt(cd.total)}</span>
          ${budget?`<span class="cat-budget-info">預算${fmt(budget)}</span>`:''}
          <span class="cat-pct-badge">${(cd.total/total*100).toFixed(1)}%</span>
        </div>
        ${budget?`<div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,pct*100).toFixed(1)}%;background:${barColor}"></div></div>`:''}
      </div>
      <div class="arrow">›</div>`;
    item.addEventListener('click',()=>toggleCat(cat,false));
    listEl.appendChild(item);

    // Detail panel with expandable notes
    const panel=document.createElement('div');
    panel.className='detail-panel'+(isOpen?' open':'');
    panel.id='panel-'+key;

    if(cd.items.length){
      const hdr=`<div class="detail-header"><span>共 <strong>${cd.items.length}</strong> 筆</span><strong>${fmt(cd.items.reduce((s,r)=>s+r.amt,0))}</strong></div>`;
      const txRows=cd.items.map((it,idx)=>{
        // Shorten desc for one-line preview (strip long receipt text after first meaningful part)
        const preview=shortDesc(it.desc);
        const hasLong=it.desc && it.desc.length>preview.length+2;
        return `<div class="tx-row" id="tx-${key}-${idx}">
          <div class="tx-main" onclick="toggleNote('${key}',${idx})">
            <span class="d-date">${it.date}</span>
            <span class="d-desc">${preview||'（無說明）'}</span>
            <span class="d-acct">${it.card||''}</span>
            <span class="d-amt${it.amt>=5000?' big':''}">${fmt(it.amt)}</span>
            ${hasLong?'<span class="expand-arrow">›</span>':''}
          </div>
          ${hasLong?`<div class="tx-note"><div class="tx-note-inner">${escHtml(it.desc)}</div></div>`:''}
        </div>`;
      }).join('');
      panel.innerHTML=hdr+txRows;
    } else {
      panel.innerHTML='<div style="padding:12px 14px;font-size:12px;color:#AAA">無詳細記錄</div>';
    }
    listEl.appendChild(panel);
  });
}

function shortDesc(desc){
  if(!desc) return '';
  // If it contains receipt-style content (multiple × signs or long chain), show first meaningful part
  // Keep up to first newline or first "  " double-space or first "#電子發票" marker
  let s=desc.split(/\s{2,}|#電子發票|2026年\d+月/)[0].trim();
  // Also cap at 30 chars
  if(s.length>32) s=s.slice(0,32)+'…';
  return s;
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleNote(catKey, idx){
  const row=document.getElementById(`tx-${catKey}-${idx}`);
  if(!row) return;
  row.classList.toggle('expanded');
}

function toggleCat(cat,scroll){
  const key=encodeURIComponent(cat);
  const item=document.getElementById('cat-'+key);
  const panel=document.getElementById('panel-'+key);
  if(openCat===cat){
    openCat=null; item?.classList.remove('open'); panel?.classList.remove('open');
  } else {
    if(openCat){const ok=encodeURIComponent(openCat);document.getElementById('cat-'+ok)?.classList.remove('open');document.getElementById('panel-'+ok)?.classList.remove('open');}
    openCat=cat; item?.classList.add('open'); panel?.classList.add('open');
    if(scroll&&item)setTimeout(()=>item.scrollIntoView({behavior:'smooth',block:'center'}),200);
  }
}

// ── Init ─────────────────────────────────────────────
(function init(){
  try{ DATA=JSON.parse(localStorage.getItem(STORE_KEY)||'{}'); }catch(e){ DATA={}; }
  const months=Object.keys(DATA).map(Number).filter(m=>Object.values(DATA[String(m)]||{}).some(c=>c.items.length));
  if(months.length){
    curMonth=Math.max(...months);
    document.getElementById('updBadge').textContent='💾 快取';
  }
  buildMonthBar();
  selectMonth(curMonth);
  // Auto-refresh from Sheets if configured
  const url=localStorage.getItem(SHEET_KEY);
  if(url) refreshSheet();
})();
</script>
